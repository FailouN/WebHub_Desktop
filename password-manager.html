<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🔑 Менеджер паролей</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            background: rgba(20, 20, 20, 0.98);
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            box-sizing: border-box;
        }
        
        /* Компактный заголовок с поддержкой перетаскивания окна */
        .window-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-app-region: drag; /* Делает окно перетаскиваемым */
            user-select: none;
        }
        .header-title { font-size: 15px; font-weight: 500; letter-spacing: 0.5px; }
        
        /* Кнопка закрытия в верхнем углу */
        .header-close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            -webkit-app-region: no-drag; /* Клик будет работать сквозь drag-область */
            transition: color 0.2s;
            padding: 0 5px;
        }
        .header-close-btn:hover { color: #ea6962; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Левая часть: Форма добавления/изменения */
        .pass-form {
            width: 260px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .pass-form h3 { margin: 0 0 5px 0; font-size: 14px; color: #aaa; }
        .pass-form input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            font-size: 13px;
        }
        .pass-form input:focus { border-color: #ea6962; outline: none; }
        .form-btns { display: flex; gap: 8px; margin-top: 5px; }
        .btn {
            flex: 1; padding: 8px; border-radius: 6px; border: none;
            cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s;
        }
        .btn-save { background: #ea6962; color: white; }
        .btn-save:hover { background: #d35d56; }
        .btn-clear { background: transparent; color: #888; }
        .btn-clear:hover { color: white; }

        /* Правая часть: Список сохраненных паролей */
        .pass-list-section { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
            font-size: 13px;
        }
        
        .list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        
        /* --- Изящный кастомный скроллбар --- */
        .list-container::-webkit-scrollbar {
            width: 6px; /* Тонкий */
        }
        .list-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .list-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .list-container::-webkit-scrollbar-thumb:hover {
            background: rgba(234, 105, 98, 0.4); /* Мягко подсвечивается при наведении */
        }
        
        /* Карточка пароля */
        .pass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            transition: 0.2s;
        }
        .pass-card:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.1); }
        
        .pass-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
        .pass-site { font-weight: 500; font-size: 14px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pass-meta { font-size: 12px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .pass-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .action-btn {
            background: rgba(255, 255, 255, 0.05); border: none; color: #ccc;
            padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
        .action-btn.del:hover { background: rgba(234, 105, 98, 0.2); color: #ea6962; }

        .footer {
            padding: 10px 20px; font-size: 11px; color: #555; text-align: center;
            background: rgba(0, 0, 0, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.03);
            transition: color 0.2s;
        }
    </style>
</head>
<body>

    <div class="window-header">
        <div class="header-title">🔑 Менеджер паролей</div>
        <button class="header-close-btn" onclick="window.close()">✕</button>
    </div>

    <div class="main-container">
        <div class="pass-form">
            <h3 id="form-title">Добавить пароль</h3>
            <input type="hidden" id="entry-id">
            <input type="text" id="form-title-input" placeholder="Название (например: Google)">
            <input type="text" id="form-url-input" placeholder="URL сайта">
            <input type="text" id="form-login-input" placeholder="Логин / Email">
            <input type="password" id="form-pass-input" placeholder="Пароль">
            
            <div class="form-btns">
                <button class="btn btn-clear" id="btn-reset" onclick="resetForm()">Сброс</button>
                <button class="btn btn-save" id="btn-save" onclick="saveEntry()">Записать</button>
            </div>
        </div>

        <div class="pass-list-section">
            <input type="text" class="search-box" id="search-input" placeholder="🔍 Быстрый поиск по названию или логину..." oninput="renderList()">
            <div class="list-container" id="pass-list"></div>
        </div>
    </div>

    <div class="footer">Клик на логин/пароль копирует их в буфер обмена | <kbd>ESC</kbd>: Закрыть</div>

    <script>
        const { ipcRenderer, clipboard } = require('electron');

        let allEntries = [];

        // Загрузка данных из зашифрованного vault.json
        async function loadPasswords() {
            allEntries = await ipcRenderer.invoke('get-passwords');
            renderList();
        }

        // Отрисовка списка с фильтром поиска
        function renderList() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('pass-list');
            
            const filtered = allEntries.filter(item => 
                (item.url && item.url.toLowerCase().includes(query)) || 
                (item.title && item.title.toLowerCase().includes(query)) ||
                (item.username && item.username.toLowerCase().includes(query))
            );

            if (filtered.length === 0) {
                container.innerHTML = '<div style="color: #666; padding: 20px; text-align: center;">Ничего не найдено</div>';
                return;
            }

            container.innerHTML = filtered.map(item => {
                const displayName = item.title || item.url || 'Без названия';
                const subMeta = item.title && item.url ? `<div class="pass-meta" title="${item.url}">🌐 Сайт: ${item.url}</div>` : '';

                return `
                    <div class="pass-card">
                        <div class="pass-info">
                            <div class="pass-site" title="${displayName}">${displayName}</div>
                            ${subMeta}
                            <div class="pass-meta" style="cursor:pointer; color:#98971a;" onclick="copyText('${item.username}', 'Логин скопирован!')" title="Копировать логин">👤 Логин: ${item.username || '—'}</div>
                            <div class="pass-meta" style="cursor:pointer; color:#458588;" onclick="copyText('${item.password}', 'Пароль скопирован!')" title="Копировать пароль">🔒 Пароль: •••••••• (нажми для копирования)</div>
                        </div>
                        <div class="pass-actions">
                            <button class="action-btn" onclick="editEntry(${item.id})">✏️</button>
                            <button class="action-btn del" onclick="deleteEntry(${item.id})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Функция копирования в буфер с уведомлением в футере
        function copyText(text, message) {
            if(!text) return;
            clipboard.writeText(text);
            
            const footer = document.querySelector('.footer');
            const originalText = footer.innerHTML;
            footer.innerText = `✅ ${message}`;
            footer.style.color = '#98971a';
            setTimeout(() => {
                footer.innerHTML = originalText;
                footer.style.color = '#555';
            }, 2000);
        }

        // Запись / Изменение
        function saveEntry() {
            const id = document.getElementById('entry-id').value;
            const title = document.getElementById('form-title-input').value.trim();
            const url = document.getElementById('form-url-input').value.trim();
            const login = document.getElementById('form-login-input').value.trim();
            const password = document.getElementById('form-pass-input').value;

            if (!url || !login || !password) {
                alert('Поля URL, Логин и Пароль обязательны!');
                return;
            }

            const entry = { title, url, login, password };
            if (id) entry.id = Number(id);

            ipcRenderer.send('save-password', entry);
            resetForm();
        }

        // Перевод формы в режим редактирования карточки
        function editEntry(id) {
            const entry = allEntries.find(p => p.id === id);
            if (!entry) return;

            document.getElementById('entry-id').value = entry.id;
            document.getElementById('form-title-input').value = entry.title || ''; 
            document.getElementById('form-url-input').value = entry.url || '';
            document.getElementById('form-login-input').value = entry.username || '';
            document.getElementById('form-pass-input').value = entry.password || '';

            document.getElementById('form-title').innerText = "Изменить пароль";
            document.getElementById('btn-save').innerText = "Обновить";
        }

        // Удаление карточки
        function deleteEntry(id) {
            if (confirm('Удалить этот аккаунт из сейфа паролей?')) {
                ipcRenderer.send('delete-password', id);
                resetForm();
            }
        }

        // Сброс формы
        function resetForm() {
            document.getElementById('entry-id').value = '';
            document.getElementById('form-title-input').value = '';
            document.getElementById('form-url-input').value = '';
            document.getElementById('form-login-input').value = '';
            document.getElementById('form-pass-input').value = '';
            document.getElementById('form-title').innerText = "Добавить пароль";
            document.getElementById('btn-save').innerText = "Записать";
        }

        // Получение данных текущей открытой вкладки для автозаполнения
        ipcRenderer.on('active-tab-pass-data', (event, data) => {
            if (data && data.url && data.url !== 'about:blank') {
                document.getElementById('form-title-input').value = data.title || '';
                document.getElementById('form-url-input').value = data.url || '';
            }
        });

        // Слушаем обновления от бэкенда
        ipcRenderer.on('passwords-updated', () => {
            loadPasswords();
        });

        // Закрытие на ESC
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.close();
        });

        // Старт
        loadPasswords();
    </script>
</body>
</html>
