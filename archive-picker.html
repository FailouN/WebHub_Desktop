<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Визуальный Архив</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
            background: rgba(20, 20, 20, 0.98);
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Новая компактная шапка с поддержкой перетаскивания окна */
        .window-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-app-region: drag;
            user-select: none;
        }

        .header-title {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .header-right-side {
            display: flex;
            align-items: center;
            gap: 15px;
            -webkit-app-region: no-drag; /* Кнопки внутри шапки должны кликаться */
        }

        /* Кнопка закрытия окна */
        .header-close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0 5px;
        }
        .header-close-btn:hover { color: #ea6962; }

        #add-current-btn {
            background: #ea6962;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
            display: none;
        }
        #add-current-btn:hover { background: #d35d56; transform: scale(1.03); }

        /* Кнопки фильтров в шапке */
        .groups-bar {
            display: flex;
            gap: 10px;
            padding: 10px 20px 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .group-btn {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
            cursor: pointer;
            transition: 0.2s;
        }

        .group-btn:hover, .group-btn.active {
            background: #ea6962;
            color: white;
            border-color: #ea6962;
        }

        .list {
            flex: 1;
            padding: 25px 20px 25px 25px; /* Справа чуть меньше отступ из-за скроллбара */
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px;
            overflow-y: auto;
            align-content: start;
            scroll-behavior: smooth;
        }

        /* --- Фирменный кастомный скроллбар для сетки архива --- */
        .list::-webkit-scrollbar {
            width: 6px; /* Делаем тонким */
        }
        .list::-webkit-scrollbar-track {
            background: transparent;
        }
        .list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .list::-webkit-scrollbar-thumb:hover {
            background: rgba(234, 105, 98, 0.4); /* Мягкий красный фокус */
        }

        .card {
            background: #2a2a2a;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            height: fit-content;
            z-index: 1;
        }

        /* ЭФФЕКТ ВЫЛЕЗАНИЯ */
        .card:hover {
            transform: translateY(-8px) scale(1.04);
            border-color: #ea6962;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 15px rgba(234, 105, 98, 0.2);
            z-index: 10;
        }

        .card-header {
            padding: 12px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header img {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }

        .card-header .title {
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #eee;
        }

        .card-body {
            aspect-ratio: 16 / 10;
            width: 100%;
            background: #1a1a1a;
            overflow: hidden;
        }

        .card-body img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .card:hover .card-body img {
            transform: scale(1.1);
        }

        #context-menu {
            display: none;
            position: fixed;
            z-index: 10000;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 6px 0;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .ctx-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #ddd;
            transition: 0.2s;
        }

        .ctx-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .ctx-item.delete { color: #f7768e; }

        .footer {
            padding: 12px;
            text-align: center;
            font-size: 11px;
            color: #555;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        /* Модальное окно переименования */
        #rename-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #2a2a2a;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #444;
            width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .modal-content input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            margin: 15px 0 20px 0;
            box-sizing: border-box;
            font-family: inherit;
        }

        .modal-content input:focus { border-color: #ea6962; }

        .modal-btns { display: flex; justify-content: flex-end; gap: 12px; }
        .modal-btns button {
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            border: none;
            transition: 0.2s;
        }

        #cancel-rename { background: transparent; color: #888; }
        #cancel-rename:hover { color: white; }
        #save-rename { background: #ea6962; color: white; }
        #save-rename:hover { background: #d35d56; }

        /* Метка группы на карточке */
        .group-tag {
            position: absolute;
            top: 45px;
            right: 10px;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(234, 105, 98, 0.8);
            color: white;
            z-index: 5;
            text-transform: uppercase;
        }

        kbd { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="window-header">
        <div class="header-title">📦 Визуальный Архив</div>
        <div class="header-right-side">
            <button id="add-current-btn">Отложить текущую</button>
            <button class="header-close-btn" onclick="window.close()">✕</button>
        </div>
    </div>

    <div class="groups-bar" id="groups-bar">
        <div class="group-btn active" onclick="filterGroup('all')">Все</div>
        <div class="group-btn" onclick="filterGroup('Работа')">Работа</div>
        <div class="group-btn" onclick="filterGroup('Учеба')">Учеба</div>
        <div class="group-btn" onclick="filterGroup('Соцсети')">Соцсети</div>
        <div class="group-btn" onclick="filterGroup('Разное')">Разное</div>
    </div>

    <div class="list" id="archive-list"></div>

    <div id="context-menu">
        <div class="ctx-item" id="ctx-rename">✏️ Переименовать</div>
        <div style="border-top: 1px solid #444; margin: 5px 0;"></div>
        <div class="ctx-item" onclick="setGroup('Работа')">📁 В «Работа»</div>
        <div class="ctx-item" onclick="setGroup('Учеба')">📁 В «Учеба»</div>
        <div class="ctx-item" onclick="setGroup('Соцсети')">📁 В «Соцсети»</div>
        <div class="ctx-item" onclick="setGroup('Разное')">📁 В «Разное»</div>
        <div style="border-top: 1px solid #444; margin: 5px 0;"></div>
        <div class="ctx-item delete" id="ctx-delete">🗑️ Удалить</div>
    </div>

    <div id="rename-modal">
        <div class="modal-content">
            <div style="font-size: 16px; font-weight: 500;">Переименовать вкладку</div>
            <input type="text" id="rename-input" placeholder="Введите название...">
            <div class="modal-btns">
                <button id="cancel-rename">Отмена</button>
                <button id="save-rename">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="footer">ЛКМ: Открыть | ПКМ: Управление | <kbd>ESC</kbd>: Закрыть</div>

    <script>
        const { ipcRenderer } = require('electron');

        let currentTabData = null;
        let rightClickedItem = null;
        const ctxMenu = document.getElementById('context-menu');
        let currentFilter = 'all';

        async function loadArchive() {
            const items = await ipcRenderer.invoke('get-archive-items');
            const container = document.getElementById('archive-list');
            
            const filtered = currentFilter === 'all' 
                ? items 
                : items.filter(i => i.group === currentFilter);

            container.innerHTML = filtered.slice().reverse().map(item => {
                let domain = '';
                try { domain = new URL(item.url).hostname; } catch(e) {}
                const thumb = item.thumbnail || 'https://via.placeholder.com/300x180';
                
                return `
                    <div class="card" onclick="openLink('${item.url}')" data-info='${JSON.stringify(item).replace(/'/g, "&apos;")}'>
                        ${item.group ? `<div class="group-tag">${item.group}</div>` : ''}
                        <div class="card-header">
                            <img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64">
                            <div class="title">${item.title || item.url}</div>
                        </div>
                        <div class="card-body">
                            <img src="${thumb}" loading="lazy">
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setGroup(groupName) {
            if (rightClickedItem && rightClickedItem.id) {
                console.log("Отправка группы:", groupName, "для ID:", rightClickedItem.id);
                
                ipcRenderer.send('change-item-group', { 
                    id: rightClickedItem.id, 
                    group: groupName 
                });

                ctxMenu.style.display = 'none';

                setTimeout(() => {
                    loadArchive();
                }, 250); 
            } else {
                console.error("Ошибка: rightClickedItem не определен");
            }
        }

        function filterGroup(groupName) {
            currentFilter = groupName;
            document.querySelectorAll('.group-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === groupName || (groupName === 'all' && btn.innerText === 'Все'));
            });
            loadArchive();
        }

        window.addEventListener('contextmenu', (e) => {
            const card = e.target.closest('.card');
            if (card) {
                e.preventDefault();
                rightClickedItem = JSON.parse(card.dataset.info);
                ctxMenu.style.display = 'block';
                ctxMenu.style.left = e.pageX + 'px';
                ctxMenu.style.top = e.pageY + 'px';
            }
        });

        window.addEventListener('click', () => ctxMenu.style.display = 'none');

        document.getElementById('ctx-delete').onclick = () => {
            if (rightClickedItem) {
                ipcRenderer.send('delete-from-archive', rightClickedItem.id);
                loadArchive();
            }
        };

        const renameModal = document.getElementById('rename-modal');
        const renameInput = document.getElementById('rename-input');

        document.getElementById('ctx-rename').onclick = () => {
            if (rightClickedItem) {
                ctxMenu.style.display = 'none';
                renameInput.value = rightClickedItem.title;
                renameModal.style.display = 'flex';
                renameInput.focus();
                renameInput.select();
            }
        };

        document.getElementById('cancel-rename').onclick = () => {
            renameModal.style.display = 'none';
        };

        document.getElementById('save-rename').onclick = () => {
            const newTitle = renameInput.value.trim();
            if (newTitle && rightClickedItem) {
                ipcRenderer.send('rename-in-archive', { 
                    id: rightClickedItem.id, 
                    title: newTitle 
                });
                renameModal.style.display = 'none';
                setTimeout(loadArchive, 200);
            }
        };

        renameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('save-rename').click();
            if (e.key === 'Escape') renameModal.style.display = 'none';
        });

        ipcRenderer.on('active-tab-data-response', (event, data) => {
            if (data && data.url && data.url !== 'about:blank') {
                currentTabData = data;
                const btn = document.getElementById('add-current-btn');
                btn.style.display = 'block';
                btn.innerText = `📦 Отложить: ${data.title.substring(0, 15)}...`;
            }
        });

        document.getElementById('add-current-btn').onclick = async () => {
            if (currentTabData) {
                await ipcRenderer.send('save-to-archive-from-picker', currentTabData);
                document.getElementById('add-current-btn').style.display = 'none';
                setTimeout(loadArchive, 500); 
            }
        };

        function openLink(url) {
            ipcRenderer.send('open-new-tab', url);
            window.close();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.close();
        });

        loadArchive();
    </script>
</body>
</html>
